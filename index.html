            font-size: 0.75rem;

        const Viewer360 = ({ product }) => {
            const [frame, setFrame] = useState(0);
            const totalFrames = 24; // Simulated frames
            const containerRef = useRef(null);

            const handleMouseMove = (e) => {
                if (!containerRef.current) return;
                const { left, width } = containerRef.current.getBoundingClientRect();
                const x = e.clientX - left;
                const percentage = Math.max(0, Math.min(1, x / width));
                const currentFrame = Math.floor(percentage * (totalFrames - 1));
                setFrame(currentFrame);
            };

            const handleTouchMove = (e) => {
                if (!containerRef.current) return;
                const { left, width } = containerRef.current.getBoundingClientRect();
                const x = e.touches[0].clientX - left;
                const percentage = Math.max(0, Math.min(1, x / width));
                const currentFrame = Math.floor(percentage * (totalFrames - 1));
                setFrame(currentFrame);
            };

            // Generate placeholder images for 360 view based on base color
            const baseImg = product.images[0];
            const bgColor = baseImg.split('/')[4] || 'hw-blue';
            const currentImg = `https://placehold.co/600x400/${bgColor}/ffffff?text=360+Angle+${frame + 1}`;

            return (

                    <div 
                        ref={containerRef}

                            ))}
                        </div>
                    </div>

                    {/* Product Grid */}
                    <main className="container mx-auto px-4 py-8 flex-grow">
                        <div className="flex justify-between items-end mb-6">
                            <h2 className="text-2xl font-bold text-gray-800">{filter === 'All' ? 'Latest Additions' : filter}</h2>
                            <span className="text-gray-500 text-sm font-medium">{filteredProducts.length} Models</span>
                        </div>

                        {filteredProducts.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-xl shadow-sm border border-gray-100">
                                <i className="fa-solid fa-box-open text-6xl text-gray-300 mb-4"></i>
                                <h3 className="text-xl font-bold text-gray-600">No models found in this category</h3>
                                <p className="text-gray-500 mt-2">Try selecting a different filter.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                {filteredProducts.map(product => (
                                    <div key={product.id} className="bg-white rounded-xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden group flex flex-col relative border border-gray-100">
                                        {/* Ribbons */}
                                        {product.status === 'New Arrival' && <div className="ribbon ribbon-new">New Arrival</div>}
                                        {product.status === 'Sold Out' && <div className="ribbon ribbon-sold">Sold Out</div>}
                                        {product.status === 'Pre-Order' && <div className="ribbon ribbon-preorder">Pre-Order</div>}
                                        
                                        {/* Image Container */}
                                        <div 
                                            className="relative h-48 bg-gray-50 cursor-pointer overflow-hidden p-4 flex items-center justify-center group-hover:bg-gray-100 transition-colors"
                                            onClick={() => setActiveProduct(product)}
                                        >
                                            <img src={product.images[0]} alt={product.name} className="max-h-full object-contain group-hover:scale-110 transition-transform duration-500" />
                                            {product.isPremium && (
                                                <div className="absolute top-2 right-2 bg-gradient-to-r from-yellow-400 to-yellow-600 text-white text-[10px] px-2 py-1 rounded shadow-sm font-bold flex items-center gap-1">
                                                    <i className="fa-solid fa-star"></i> Premium
                                                </div>
                                            )}
                                        </div>

                                        {/* Content */}
                                        <div className="p-4 flex flex-col flex-grow">
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="text-[10px] font-bold uppercase tracking-wider text-hw-blue">{product.category}</span>
                                                <span className="text-[10px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded font-semibold border border-gray-200 truncate max-w-[80px]" title={product.condition}>
                                                    {product.condition}
                                                </span>
                                            </div>
                                            
                                            <h3 
                                                className="font-bold text-gray-900 leading-tight mb-3 cursor-pointer hover:text-hw-orange transition-colors flex-grow"
                                                onClick={() => setActiveProduct(product)}
                                            >
                                                {product.name}
                                            </h3>
                                            
                                            <div className="flex items-center justify-between mt-auto pt-3 border-t border-gray-100">
                                                <div className="flex flex-col">
                                                    <span className="text-xs text-gray-500 font-semibold mb-0.5">Price</span>
                                                    <div className="flex items-center gap-1.5">
                                                        <span className="text-lg font-extrabold text-gray-900">₹{product.price}</span>
                                                        <span className="text-[10px] border border-hw-blue text-hw-blue px-1 rounded-sm font-bold bg-blue-50">
                                                            {product.origin}
                                                        </span>
                                                    </div>
                                                </div>
                                                
                                                {product.stock > 0 ? (
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); addToCart(product); }}
                                                        className="w-10 h-10 rounded-full bg-hw-blue text-white hover:bg-blue-800 flex items-center justify-center shadow-md transition-transform active:scale-95"
                                                        title="Add to Cart"
                                                    >
                                                        <i className="fa-solid fa-plus"></i>
                                                    </button>
                                                ) : (
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); alert('We will notify you!'); }}
                                                        className="w-10 h-10 rounded-full bg-gray-200 text-gray-600 hover:bg-gray-300 flex items-center justify-center transition-transform active:scale-95"
                                                        title="Notify Me"
                                                    >
                                                        <i className="fa-solid fa-bell"></i>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modals & Overlays */}
                    {activeProduct && (
                        <ProductModal 
                            product={activeProduct} 
                            onClose={() => setActiveProduct(null)} 
                            onAddToCart={addToCart} 
                        />
                    )}

                    {/* Cart Sidebar */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-black bg-opacity-50 backdrop-blur-sm transition-opacity" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col animate-[slideIn_0.3s_ease-out]">
                                <div className="p-4 bg-hw-dark text-white flex justify-between items-center border-b-4 border-hw-orange">
                                    <h2 className="text-xl font-bold brand-font tracking-wide"><i className="fa-solid fa-shopping-cart mr-2"></i> Your Garage</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="text-gray-300 hover:text-white bg-white/10 w-8 h-8 rounded-full flex items-center justify-center transition-colors">
                                        <i className="fa-solid fa-times"></i>
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-4 bg-gray-50">
                                    {cart.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-gray-500 space-y-4">
                                            <i className="fa-solid fa-car-tunnel text-5xl text-gray-300"></i>
                                            <p className="font-medium text-lg">Your garage is empty.</p>
                                            <button onClick={() => setIsCartOpen(false)} className="text-hw-blue font-bold hover:underline">Start adding models</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {cart.map(item => (
                                                <div key={item.id} className="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex gap-3 relative">
                                                    <button onClick={() => removeFromCart(item.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 hover:bg-red-500 hover:text-white w-6 h-6 rounded-full flex items-center justify-center text-xs transition-colors shadow-sm">
                                                        <i className="fa-solid fa-times"></i>
                                                    </button>
                                                    <img src={item.images[0]} alt={item.name} className="w-16 h-16 object-contain bg-gray-50 rounded" />
                                                    <div className="flex-1 flex flex-col justify-between">
                                                        <div>
                                                            <h4 className="text-sm font-bold text-gray-900 leading-tight">{item.name}</h4>
                                                            <div className="flex items-center gap-1 mt-1">
                                                                <span className="text-xs text-hw-orange font-bold">₹{item.price}</span>
                                                                <span className="text-[9px] bg-gray-100 text-gray-500 px-1 rounded">{item.origin}</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-3 mt-2">
                                                            <div className="flex items-center border rounded bg-gray-50">
                                                                <button onClick={() => updateQuantity(item.id, -1)} className="px-2 py-0.5 text-gray-500 hover:text-hw-blue hover:bg-gray-200 transition-colors">-</button>
                                                                <span className="text-xs font-bold px-2 w-6 text-center">{item.quantity}</span>
                                                                <button onClick={() => updateQuantity(item.id, 1)} className="px-2 py-0.5 text-gray-500 hover:text-hw-blue hover:bg-gray-200 transition-colors">+</button>
                                                            </div>
                                                            <span className="text-xs font-bold text-gray-800 ml-auto">₹{item.price * item.quantity}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {cart.length > 0 && (
                                    <div className="p-4 bg-white border-t border-gray-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="text-gray-600 font-medium">Subtotal</span>
                                            <span className="text-2xl font-extrabold text-gray-900">₹{cartTotal}</span>
                                        </div>
                                        <form onSubmit={handleCheckout} className="space-y-3">
                                            <div>
                                                <small><h5>Packing charges: 40rs onwards</h5></small>
                                                <small><h5>Shipping charges: 100rs onwards</h5></small>
                                                <label className="block text-xs font-bold text-gray-700 mb-1 uppercase tracking-wide">Phone Number *</label>
                                                <input 
                                                    type="tel" 
                                                    required 
                                                    value={phone}
                                                    onChange={e => setPhone(e.target.value)}
                                                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-hw-blue focus:border-transparent" 
                                                    placeholder="e.g. +91 XXXXXXXXXX"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-gray-700 mb-1 uppercase tracking-wide">Email Address *</label>
                                                <input 
                                                    type="email" 
                                                    required 
                                                    value={email}
                                                    onChange={e => setEmail(e.target.value)}
                                                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-hw-blue focus:border-transparent" 
                                                    placeholder="your@email.com"
                                                />
                                            </div>
                                            <button 
                                                type="submit" 
                                                disabled={isSubmitting}
                                                className={`w-full py-3 rounded-lg font-bold text-white shadow-md transition-all flex items-center justify-center gap-2 ${isSubmitting ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 hover:shadow-lg'}`}
                                            >
                                                {isSubmitting ? (
                                                    <><i className="fa-solid fa-circle-notch fa-spin"></i> Submitting...</>
                                                ) : (
                                                    <><i className="fa-solid fa-paper-plane"></i> Submit Request to Buy</>
                                                )}
                                            </button>
                                            <p className="text-[10px] text-gray-400 text-center mt-2">
                                                By submitting, you will notify Bangalore Diecast Crew of your interest. Payment is handled directly.
                                                Additional Shipping and Packing charges - Damage/Lost in transit not covered!
                                                
                                            </p>
                                        </form>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                    
                    {/* Add custom CSS animation for cart sliding */}
                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes slideIn {
                            from { transform: translateX(100%); }
                            to { transform: translateX(0); }
                        }
                    `}} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
